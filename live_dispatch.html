<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy"
content="default-src * 'self' data: blob: 'unsafe-inline' 'unsafe-eval'">

<title>Live Dispatch</title>

<style>

:root{
--bg:#020c1b;
--card:#0f1f3d;
--text:#e6f1ff;
--primary:#00d4ff;
--danger:#ff5252;
--accent:#4caf50;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* HEADER */
.header{
display:flex;
align-items:center;
padding:12px;
background:#061529;
position:sticky;
top:0;
z-index:100;
}

.back{
background:var(--primary);
border:none;
padding:10px 14px;
border-radius:10px;
margin-right:10px;
font-weight:bold;
font-size:18px;
color:#000;
}

/* SEARCH */
.search{
padding:10px;
}

.search input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:var(--card);
color:white;
font-size:15px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:linear-gradient(135deg,#00d4ff,#007bff);
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
color:#000;
}

.card span{
display:block;
font-size:20px;
margin-top:5px;
}

/* TABLE */
.table-box{
margin:10px;
background:var(--card);
border-radius:12px;
overflow:auto;
max-height:60vh;
}

table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

th{
background:#112a55;
padding:12px;
position:sticky;
top:0;
}

td{
padding:10px;
border-bottom:1px solid #1e3a5f;
text-align:center;
font-size:14px;
}

/* STATUS */
.pending{
background:#5a1f1f;
}

.done{
background:#123b26;
}

/* BUTTON */
.btn{
margin:10px;
padding:14px;
border:none;
border-radius:10px;
background:var(--primary);
color:#000;
font-weight:bold;
width:calc(100% - 20px);
font-size:15px;
}

/* LOADING */
.loading{
padding:20px;
text-align:center;
opacity:.8;
}

</style>

</head>

<body>

<div class="header">

<button class="back"
onclick="goBack()">
←
</button>

<h3>Live Dispatch</h3>

</div>

<div class="search">

<input type="text"
id="search"
placeholder="🔍 Search Vehicle..."
onkeyup="renderAll()">

</div>

<div class="cards">

<div class="card">
Trucks
<span id="c1">0</span>
</div>

<div class="card">
Gross
<span id="c2">0</span>
</div>

<div class="card">
Pending
<span id="c3">0</span>
</div>

<div class="card">
Double
<span id="c4">0</span>
</div>

<div class="card">
Triple
<span id="c5">0</span>
</div>

<div class="card">
Entries
<span id="c6">0</span>
</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>Vehicle</th>
<th>Tare</th>
<th>Gross</th>
<th>Time</th>
<th>TAT</th>
</tr>

</thead>

<tbody id="tbody">

<tr>
<td colspan="5"
class="loading">

Loading...

</td>
</tr>

</tbody>

</table>

</div>

<button class="btn"
onclick="manualRefresh()">

🔄 Refresh

</button>

<script>

/* BACK */
function goBack(){

window.location.href =
"dashboard.html";

}

/* API */
const API_URL =
"https://script.google.com/macros/s/AKfycbz_d-7LEMHd9Aacm-8KNFnYP60NWAWeXrn6sN265htHUIp2ewhWip3a2TL2X35MbvxQvw/exec";

/* CACHE */
const CACHE_KEY =
"live_dispatch_cache";

const CACHE_TIME =
2 * 60 * 1000;

let fullData = [];

/* SAFE NUMBER */
function safeNumber(v){

if(v === null || v === undefined)
return 0;

v = String(v)
.replace(/,/g,'')
.trim();

let n = parseFloat(v);

if(isNaN(n))
return 0;

return n;

}

/* LOAD */
function loadData(){

let tbody =
document.getElementById(
"tbody"
);

tbody.innerHTML =
`
<tr>
<td colspan="5"
class="loading">
Loading...
</td>
</tr>
`;

/* CACHE */
try{

let cache =
localStorage.getItem(
CACHE_KEY
);

if(cache){

let parsed =
JSON.parse(cache);

if(
Date.now() -
parsed.time
<
CACHE_TIME
){

fullData =
parsed.data;

renderAll();

return;

}

}

}catch(e){

console.log(
"cache error"
);

}

/* XHR */
let xhr =
new XMLHttpRequest();

xhr.open(
"GET",
API_URL + "?t=" + Date.now(),
true
);

xhr.onreadystatechange =
function(){

if(xhr.readyState === 4){

if(xhr.status === 200){

try{

let data =
JSON.parse(
xhr.responseText
);

fullData =
data;

/* SAVE CACHE */
try{

localStorage.setItem(
CACHE_KEY,
JSON.stringify({
time:Date.now(),
data:fullData
})
);

}catch(e){}

/* RENDER */
renderAll();

}catch(err){

console.log(err);

tbody.innerHTML =
`
<tr>
<td colspan="5">
JSON Parse Error
</td>
</tr>
`;

}

}else{

tbody.innerHTML =
`
<tr>
<td colspan="5">
Server Error
</td>
</tr>
`;

}

}

};

xhr.onerror =
function(){

tbody.innerHTML =
`
<tr>
<td colspan="5">
Network Error
</td>
</tr>
`;

};

xhr.send();

}

/* AUTO REFRESH */
setInterval(
loadData,
30000
);

/* MANUAL */
function manualRefresh(){

try{

localStorage.removeItem(
CACHE_KEY
);

}catch(e){}

loadData();

}

/* RENDER */
function renderAll(){

let search =
document.getElementById(
"search"
).value.toLowerCase();

let tbody =
document.getElementById(
"tbody"
);

tbody.innerHTML = "";

let vehicleCount = {};

let totalEntries = 0;

let totalGross = 0;

/* LOOP */
for(
let i=1;
i<fullData.length;
i++
){

let row =
fullData[i];

if(!row)
continue;

let vehicle =
String(
row[1] || ""
).trim();

if(!vehicle)
continue;

/* SEARCH */
if(
search &&
!vehicle.toLowerCase()
.includes(search)
)
continue;

let tare =
safeNumber(row[2]);

let gross =
safeNumber(row[3]);

let time =
row[4] || "";

let tat =
row[5] || "";

totalEntries++;

if(!vehicleCount[vehicle]){

vehicleCount[vehicle] = 0;

}

vehicleCount[vehicle]++;

if(gross > 0){

totalGross++;

}

/* ROW */
let tr =
document.createElement(
"tr"
);

tr.className =
gross <= 0
?
"pending"
:
"done";

tr.innerHTML =
`
<td>
${vehicle}
</td>

<td>
${tare.toLocaleString()}
</td>

<td>
${gross.toLocaleString()}
</td>

<td>
${time}
</td>

<td>
${tat}
</td>
`;

tbody.appendChild(tr);

}

/* EMPTY */
if(totalEntries === 0){

tbody.innerHTML =
`
<tr>
<td colspan="5">
No Data Found
</td>
</tr>
`;

}

/* SUMMARY */
let unique =
Object.keys(
vehicleCount
).length;

let double = 0;

let triple = 0;

for(let v in vehicleCount){

if(vehicleCount[v] == 2){

double++;

}

if(vehicleCount[v] >= 3){

triple++;

}

}

let pending =
totalEntries - totalGross;

/* UI */
document.getElementById(
"c1"
).innerText =
unique.toLocaleString();

document.getElementById(
"c2"
).innerText =
totalGross.toLocaleString();

document.getElementById(
"c3"
).innerText =
pending.toLocaleString();

document.getElementById(
"c4"
).innerText =
double.toLocaleString();

document.getElementById(
"c5"
).innerText =
triple.toLocaleString();

document.getElementById(
"c6"
).innerText =
totalEntries.toLocaleString();

}

/* START */
loadData();

</script>

</body>

</html>

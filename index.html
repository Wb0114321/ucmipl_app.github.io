<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>UCMIPL Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg1:#020c1b;
--bg2:#07162c;
--card:#112240;
--text:#e6f1ff;
--primary:#00d4ff;
--primary2:#007bff;
--danger:#ff5c7c;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#00d4ff33,transparent 30%),
radial-gradient(circle at bottom right,#007bff22,transparent 30%),
linear-gradient(135deg,var(--bg1),var(--bg2));
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
color:var(--text);
overflow:hidden;
}

.login-box{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:24px 18px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
animation:fadeIn .5s ease;
}

.logo{
width:80px;
height:80px;
margin:auto;
margin-bottom:14px;
border-radius:24px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:800;
color:white;
box-shadow:0 10px 30px rgba(0,212,255,0.3);
}

.title{
text-align:center;
font-size:34px;
font-weight:800;
margin-bottom:5px;
letter-spacing:2px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:.8;
margin-bottom:25px;
}

.field{
margin-bottom:16px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

.input-box{
position:relative;
}

.input-box span{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
font-size:18px;
}

input{
width:100%;
height:56px;
border:none;
outline:none;
padding:0 16px 0 46px;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
border:1px solid rgba(255,255,255,0.08);
}

input:focus{
border:1px solid var(--primary);
box-shadow:0 0 0 3px rgba(0,212,255,0.15);
}

input::placeholder{
color:#b8c5d8;
}

.login-btn{
width:100%;
height:56px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
font-size:17px;
font-weight:800;
cursor:pointer;
margin-top:8px;
box-shadow:0 10px 25px rgba(0,212,255,0.25);
}

.login-btn:active{
transform:scale(.98);
}

.msg{
text-align:center;
margin-top:15px;
font-size:14px;
font-weight:600;
min-height:20px;
color:var(--danger);
}

.footer{
margin-top:16px;
text-align:center;
font-size:12px;
opacity:.7;
}

.loading{
display:none;
margin:auto;
margin-top:14px;
width:32px;
height:32px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:480px){

body{
padding:14px;
}

.login-box{
padding:22px 16px;
border-radius:24px;
}

.title{
font-size:30px;
}

}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">U</div>

<div class="title">UCMIPL</div>

<div class="subtitle">
Secure Login Access
</div>

<div class="field">
<label>Username</label>

<div class="input-box">
<span>👤</span>
<input type="text" id="username" placeholder="Enter Username">
</div>
</div>

<div class="field">
<label>Password</label>

<div class="input-box">
<span>🔒</span>
<input type="password" id="password" placeholder="Enter Password">
</div>
</div>

<button class="login-btn" onclick="login()">
Login
</button>

<div class="loading" id="loading"></div>

<div class="msg" id="msg"></div>

<div class="footer">
UCMIPL Dispatch Monitoring System
</div>

</div>

<script>

// 🔥 USERS API
const API_URL =
"https://script.google.com/macros/s/AKfycbzYccPIgrf6LLentmj3saKKoWZTbR8tgAtHxGfok3G9JaDnpMbuSRV6WEARLJuDsGc-mA/exec";

// AUTO LOGIN
if(localStorage.getItem("user")){
window.location.href="dashboard.html";
}

async function login(){

let user =
document.getElementById("username").value.trim();

let pass =
document.getElementById("password").value.trim();

let msg =
document.getElementById("msg");

let loading =
document.getElementById("loading");

if(user==="" || pass===""){
msg.innerText="Enter Username & Password";
return;
}

msg.innerText="";
loading.style.display="block";

try{

// 🔥 CACHE BREAK
const res = await fetch(
API_URL + "?t=" + Date.now()
);

const data = await res.json();

let success = false;

for(let i=1;i<data.length;i++){

let dbUser =
String(data[i][0]).trim();

let dbPass =
String(data[i][1]).trim();

if(
dbUser === user &&
dbPass === pass
){

success = true;

localStorage.setItem("user",user);

window.location.href="dashboard.html";

break;
}
}

loading.style.display="none";

if(!success){
msg.innerText="Invalid Username or Password";
}

}catch(err){

console.log(err);

loading.style.display="none";

msg.innerText="Server Error";

}

}

// ENTER KEY
document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>

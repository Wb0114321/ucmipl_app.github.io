<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCMIPL Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-1: #04111f;
            --bg-2: #0a1830;
            --bg-3: #10264a;
            --card-bg: rgba(255, 255, 255, 0.10);
            --card-border: rgba(255, 255, 255, 0.14);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.12);
            --text: #f4f8ff;
            --muted: #b6c3d9;
            --primary: #1ec8ff;
            --primary-2: #3d7cff;
            --danger: #ff7f96;
            --success: #6ee7b7;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            min-height: 100dvh;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(30, 200, 255, 0.22), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(61, 124, 255, 0.18), transparent 24%),
                radial-gradient(circle at 50% 90%, rgba(30, 200, 255, 0.10), transparent 28%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            overflow: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(12px);
            z-index: 0;
            animation: floatOrb 9s ease-in-out infinite;
        }

        body::before {
            width: 180px;
            height: 180px;
            top: 5%;
            left: -50px;
            background: linear-gradient(135deg, rgba(30, 200, 255, 0.30), rgba(30, 200, 255, 0.03));
        }

        body::after {
            width: 220px;
            height: 220px;
            bottom: 2%;
            right: -70px;
            background: linear-gradient(135deg, rgba(61, 124, 255, 0.24), rgba(61, 124, 255, 0.03));
            animation-delay: -3s;
        }

        .screen {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand {
            text-align: center;
            margin-bottom: 18px;
        }

        .brand-badge {
            width: 74px;
            height: 74px;
            margin: 0 auto 14px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1ec8ff, #5a67ff);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .brand-badge span {
            font-size: 30px;
            font-weight: 800;
            color: white;
        }

        .company-name {
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: 2px;
        }

        .login-box {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: 22px 16px 16px;
            overflow: hidden;
            isolation: isolate;
        }

        .login-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
            z-index: -1;
        }

        .shine {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: inherit;
        }

        .shine::after {
            content: "";
            position: absolute;
            top: -120%;
            left: -45%;
            width: 42%;
            height: 260%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            transform: rotate(18deg);
            animation: shineMove 5s linear infinite;
        }

        .heading {
            text-align: center;
            margin-bottom: 18px;
        }

        .heading h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .heading p {
            color: var(--muted);
            font-size: 13px;
        }

        .field {
            margin-bottom: 14px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #dbe8ff;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            opacity: 0.85;
            pointer-events: none;
        }

        input {
            width: 100%;
            height: 56px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 16px;
            padding: 0 46px 0 42px;
            outline: none;
            font-size: 16px;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
        }

        input::placeholder {
            color: #c7d3e3;
            opacity: 0.68;
        }

        input:focus {
            border-color: rgba(30, 200, 255, 0.70);
            box-shadow: 0 0 0 4px rgba(30, 200, 255, 0.12);
            background: rgba(255,255,255,0.12);
        }

        .login-btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: 0 16px 32px rgba(30, 200, 255, 0.26);
            transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
            margin-top: 6px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .msg {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--danger);
        }

        .footer-note {
            margin-top: 12px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-14px) translateX(10px); }
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(18px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes shineMove {
            0% { transform: translateX(-180%) rotate(18deg); }
            100% { transform: translateX(380%) rotate(18deg); }
        }

        @media (max-width: 420px) {
            body {
                padding: 14px;
            }

            .login-box {
                padding: 20px 14px 14px;
                border-radius: 24px;
            }

            .company-name {
                font-size: 30px;
            }

            .heading h2 {
                font-size: 22px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="screen">
        <section class="brand">
            <div class="brand-badge"><span>U</span></div>
            <h1 class="company-name">UCMIPL</h1>
        </section>

        <section class="login-box">
            <div class="shine"></div>

            <div class="heading">
                <h2>Login</h2>
                <p>Enter your username and password</p>
            </div>

            <div class="field">
                <label class="label" for="username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="Username">
                </div>
            </div>

            <div class="field">
                <label class="label" for="password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Password">
                </div>
            </div>

            <button class="login-btn" onclick="login()">Login</button>

            <div class="msg" id="msg"></div>
            <div class="footer-note">Secure Access</div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYccPIgrf6LLentmj3saKKoWZTbR8tgAtHxGfok3G9JaDnpMbuSRV6WEARLJuDsGc-mA/exec";

        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    username: user,
                    password: pass
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    localStorage.setItem("user", user);
                    window.location.href = "dashboard.html";
                } else {
                    document.getElementById("msg").innerText = "Invalid Username or Password";
                }
            })
            .catch(err => {
                document.getElementById("msg").innerText = "Server Error";
            });
        }
    </script>
</body>
</html>

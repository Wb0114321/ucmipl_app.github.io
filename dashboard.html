<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter;
background:linear-gradient(145deg,#04111f,#0a1830,#10264a);
color:white;
}

.app{max-width:460px;margin:auto;padding:15px;}

.topbar{
display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;
}

.logout{
background:#8b0000;
border:none;
padding:8px 12px;
border-radius:10px;
color:white;
}

.hero{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.scard{
background:linear-gradient(135deg,#1ec8ff,#4f7cff);
padding:12px;
border-radius:14px;
text-align:center;
font-weight:bold;
}

.scard span{
display:block;
font-size:18px;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
<h2>UCMIPL</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="hero">
<div>Welcome</div>
<div id="user" style="font-size:20px;font-weight:800;"></div>

<div class="summary">
<div class="scard">Target <span id="t">-</span></div>
<div class="scard">Achieved <span id="a">-</span></div>
<div class="scard">Remaining <span id="r">-</span></div>
<div class="scard">% Done <span id="p">-</span></div>
</div>
</div>

<div class="grid">
<div class="card" onclick="go('dpr.html')">📄 DPR</div>
<div class="card" onclick="go('datewise.html')">📅 Date Wise</div>
<div class="card" onclick="go('monthwise.html')">🗓️ Month Wise</div>
<div class="card" onclick="go('permit.html')">✅ Permit</div>
<div class="card" onclick="go('cancel.html')">❌ Cancelled</div>
<div class="card" onclick="go('live_dispatch.html')">🚚 Live</div>
<div class="card" onclick="go('Summarytg.html')">📊 Target</div>
</div>

</div>

<script>

// LOGIN
if(!localStorage.getItem("user")){
window.location="index.html";
}
document.getElementById("user").innerText=localStorage.getItem("user");

// NAV
function go(p){window.location=p;}
function logout(){
localStorage.removeItem("user");
window.location="index.html";
}

// 🔥 IMPORTANT
const API_URL="https://script.google.com/macros/s/AKfycbw7gp0-WUVigLKt8Saced-bkuU-BEQXjJx82tIvUnKPxfEfDckpvQr2zg4ExrYfRdA1pA/exec"; // 👈 CHANGE
const TARGET=4000000;

async function loadSummary(){

try{

console.log("Fetching...");

let res = await fetch(API_URL);
let data = await res.json();

console.log("DATA:", data);

if(!data || data.length==0){
throw "No data";
}

let total=0;

// ✅ skip header + empty row fix
for(let i=1;i<data.length;i++){

let row = data[i];

if(!row || row.length < 3) continue;

let qty = parseFloat(row[2]);

if(!isNaN(qty)){
total += qty;
}
}

// calc
let remaining = TARGET - total;
let percent = ((total/TARGET)*100);

// UI
document.getElementById("t").innerText = TARGET.toLocaleString();
document.getElementById("a").innerText = total.toFixed(2);
document.getElementById("r").innerText = remaining.toFixed(2);
document.getElementById("p").innerText = percent.toFixed(2)+"%";

}catch(e){

console.log("ERROR:", e);

// ❌ fallback
document.getElementById("t").innerText="ERR";
document.getElementById("a").innerText="ERR";
document.getElementById("r").innerText="ERR";
document.getElementById("p").innerText="ERR";

}

}

// 🔁 AUTO REFRESH
loadSummary();
setInterval(loadSummary,60000);

</script>

</body>
</html>

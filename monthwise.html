<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy"
content="default-src * 'self' data: blob: 'unsafe-inline' 'unsafe-eval'">

<title>Month Wise Report</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--bg:#020c1b;
--card:#0f1f3d;
--text:#e6f1ff;
--primary:#00d4ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

.header{
display:flex;
align-items:center;
padding:12px;
background:#061529;
position:sticky;
top:0;
z-index:100;
}

.back{
background:var(--primary);
border:none;
padding:10px 14px;
border-radius:10px;
margin-right:10px;
font-size:18px;
font-weight:bold;
color:#000;
}

.container{
padding:12px;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:var(--primary);
color:#000;
font-weight:bold;
width:100%;
margin-bottom:10px;
font-size:15px;
}

.table-container{
background:var(--card);
border-radius:12px;
overflow:auto;
margin:12px;
max-height:60vh;
}

table{
width:100%;
border-collapse:collapse;
min-width:500px;
}

th{
background:#112a55;
padding:12px;
position:sticky;
top:0;
}

td{
padding:12px;
border-bottom:1px solid #1e3a5f;
text-align:center;
}

.chart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e0;
display:none;
z-index:200;
padding:15px;
overflow:auto;
}

.chart-box{
background:#0f1f3d;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.close-btn{
background:red;
color:white;
margin-bottom:10px;
}

.loading{
padding:20px;
text-align:center;
}

.summary{
margin:12px;
padding:14px;
background:linear-gradient(135deg,#00d4ff,#007bff);
border-radius:12px;
font-weight:bold;
line-height:1.8;
color:#000;
}

</style>

</head>

<body>

<div class="header">

<button class="back"
onclick="goBack()">
←
</button>

<h3>Month Report</h3>

</div>

<div class="summary"
id="summary">

Loading data...

</div>

<div class="table-container">

<table id="table">

<thead>

<tr>
<th>Month</th>
<th>Trips</th>
<th>Qty</th>
</tr>

</thead>

<tbody>

<tr>
<td colspan="3"
class="loading">

Loading...

</td>
</tr>

</tbody>

</table>

</div>

<div class="container"
id="reportArea">

<button onclick="toggleCharts()">
📊 Show Charts
</button>

<button onclick="downloadPDF()">
📄 Download PDF
</button>

</div>

<div id="chartOverlay"
class="chart-overlay">

<button class="close-btn"
onclick="toggleCharts()">

❌ Close

</button>

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<canvas id="lineChart"></canvas>
</div>

</div>

<script>

/* BACK */
function goBack(){

window.location.href =
"dashboard.html";

}

/* API */
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8HFA_3lxDYGajwjgHwFT8TkDahk2YxPy8VVC9CSl_BNjAOjJh_hopAkZ2qkOY80Gpg/exec";

/* CACHE */
const CACHE_KEY =
"month_cache";

const CACHE_TIME =
5 * 60 * 1000;

let monthData = [];

let barChart = null;
let pieChart = null;
let lineChart = null;

/* SAFE NUMBER */
function safeNumber(v){

if(v === null || v === undefined)
return 0;

v = String(v)
.replace(/,/g,'')
.trim();

let n = parseFloat(v);

if(isNaN(n))
return 0;

return n;

}

/* LOAD DATA */
function loadData(){

/* CACHE */
try{

let cache =
localStorage.getItem(
CACHE_KEY
);

if(cache){

let parsed =
JSON.parse(cache);

if(
Date.now() -
parsed.time
<
CACHE_TIME
){

monthData =
parsed.data;

renderTable();
renderCharts();

return;

}

}

}catch(e){}

/* XHR */
let xhr =
new XMLHttpRequest();

xhr.open(
"GET",
API_URL + "?t=" + Date.now(),
true
);

xhr.onreadystatechange =
function(){

if(xhr.readyState === 4){

if(xhr.status === 200){

try{

let data =
JSON.parse(
xhr.responseText
);

monthData = data;

/* CACHE SAVE */
try{

localStorage.setItem(
CACHE_KEY,
JSON.stringify({
time:Date.now(),
data:monthData
})
);

}catch(e){}

renderTable();

renderCharts();

}catch(err){

console.log(err);

document.querySelector(
"#table tbody"
).innerHTML =
`
<tr>
<td colspan="3">
JSON Error
</td>
</tr>
`;

}

}else{

document.querySelector(
"#table tbody"
).innerHTML =
`
<tr>
<td colspan="3">
Server Error
</td>
</tr>
`;

}

}

};

xhr.onerror =
function(){

document.querySelector(
"#table tbody"
).innerHTML =
`
<tr>
<td colspan="3">
Network Error
</td>
</tr>
`;

};

xhr.send();

}

/* TABLE */
function renderTable(){

let tbody =
document.querySelector(
"#table tbody"
);

tbody.innerHTML = "";

let totalTrips = 0;

let totalQty = 0;

monthData.forEach(r=>{

let trips =
safeNumber(r.trips);

let qty =
safeNumber(r.qty);

totalTrips += trips;

totalQty += qty;

let tr =
document.createElement(
"tr"
);

tr.innerHTML =
`
<td>
${r.month}
</td>

<td>
${trips.toLocaleString()}
</td>

<td>
${qty.toLocaleString(undefined,{
minimumFractionDigits:2,
maximumFractionDigits:2
})}
</td>
`;

tbody.appendChild(tr);

});

/* SUMMARY */
document.getElementById(
"summary"
).innerHTML =
`
Total Trips :
${totalTrips.toLocaleString()}

<br><br>

Total Qty :
${totalQty.toLocaleString(undefined,{
minimumFractionDigits:2,
maximumFractionDigits:2
})}
`;

}

/* CHARTS */
function renderCharts(){

let labels =
monthData.map(x=>x.month);

let trips =
monthData.map(x=>
safeNumber(x.trips)
);

let qty =
monthData.map(x=>
safeNumber(x.qty)
);

/* DESTROY OLD */
if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();
if(lineChart) lineChart.destroy();

/* BAR */
barChart =
new Chart(
document.getElementById(
"barChart"
),
{
type:'bar',

data:{
labels,
datasets:[
{
label:"Trips",
data:trips
},
{
label:"Qty",
data:qty
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}
}
);

/* PIE */
pieChart =
new Chart(
document.getElementById(
"pieChart"
),
{
type:'pie',

data:{
labels,
datasets:[
{
data:trips
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}
}
);

/* LINE */
lineChart =
new Chart(
document.getElementById(
"lineChart"
),
{
type:'line',

data:{
labels,
datasets:[
{
label:"Qty",
data:qty
}
]
},

options:{
responsive:true,
maintainAspectRatio:false
}
}
);

}

/* TOGGLE */
function toggleCharts(){

let el =
document.getElementById(
"chartOverlay"
);

el.style.display =
(
el.style.display === "block"
)
?
"none"
:
"block";

}

/* PDF */
function downloadPDF(){

const {jsPDF} =
window.jspdf;

html2canvas(
document.getElementById(
"reportArea"
)
).then(canvas=>{

let img =
canvas.toDataURL(
"image/png"
);

let pdf =
new jsPDF(
'landscape',
'mm',
'a3'
);

pdf.addImage(
img,
'PNG',
10,
10,
400,
250
);

pdf.save(
"Month_Report.pdf"
);

});

}

/* AUTO REFRESH */
setInterval(
loadData,
60000
);

/* START */
loadData();

</script>

</body>

</html>
